databases:
  - name: xray-db
    plan: free
    databaseName: xray
    user: xray

services:
  - type: web
    name: xray-oryx
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn xray.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: xray-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "xray-oryx.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"
